version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    groups:
      frontend:
        patterns:
          - "react*"
          - "@radix-ui/*"
          - "@tanstack/*"
          - "@trpc/*"
          - "vite*"
      aws:
        patterns:
          - "@aws-sdk/*"
      tooling:
        patterns:
          - "eslint*"
          - "typescript*"
          - "vitest"
          - "prettier"
          - "drizzle*"
