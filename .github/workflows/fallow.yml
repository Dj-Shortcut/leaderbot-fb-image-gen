name: Fallow

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      fail_on_issues:
        description: "Fail the workflow when Fallow finds issues"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: fallow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codebase-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fallow - Codebase Health
        uses: fallow-rs/fallow@v2.26.1
        with:
          version: 2.26.1
          fail-on-issues: true
          format: json
