name: Fallow

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      fail_on_issues:
        description: "Fail the workflow when Fallow finds issues"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: fallow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codebase-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fallow - Codebase Health
        uses: fallow-rs/fallow@v2.27.0
        with:
          version: 2.27.0
          fail-on-issues: false
          format: json

      - name: Generate Fallow report
        shell: bash
        run: |
          mkdir -p .fallow
          npx --yes fallow@2.27.0 -f json > .fallow/report.json

      - name: Build maintainability badge
        run: |
          node scripts/fallow-badge.mjs \
            .fallow/report.json \
            public/badges/fallow-maintainability.json \
            public/badges/fallow-metrics.json

      - name: Commit badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- public/badges/fallow-maintainability.json public/badges/fallow-metrics.json; then
            echo "Badge files unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/badges/fallow-maintainability.json public/badges/fallow-metrics.json
          git commit -m "chore: update Fallow maintainability badge"
          git push

      - name: Enforce strict Fallow gate
        run: |
          node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync('.fallow/report.json','utf8')); const issues=Number(report.check?.total_issues ?? report.total_issues ?? 0); if (issues > 0) { console.error('Fallow found ' + issues + ' issues'); process.exit(1); }"
