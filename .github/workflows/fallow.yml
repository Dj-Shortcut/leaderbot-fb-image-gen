name: Fallow

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fallow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codebase-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fallow - Codebase Health
        uses: fallow-rs/fallow@v2.27.0
        with:
          version: 2.27.0
          fail-on-issues: false
          format: json

      - name: Generate Fallow report
        shell: bash
        run: |
          mkdir -p .fallow
          if ! npx --yes fallow@2.27.0 --root . -f json > .fallow/report.json.tmp; then
            echo "Fallow exited non-zero; validating generated report before continuing"
          fi
          node -e "JSON.parse(require('node:fs').readFileSync('.fallow/report.json.tmp','utf8'))"
          mv .fallow/report.json.tmp .fallow/report.json

      - name: Generate production Fallow report
        shell: bash
        run: |
          mkdir -p .fallow
          if ! npx --yes fallow@2.27.0 --root . --production -f json > .fallow/report-production.json.tmp; then
            echo "Fallow exited non-zero; validating generated production report before continuing"
          fi
          node -e "JSON.parse(require('node:fs').readFileSync('.fallow/report-production.json.tmp','utf8'))"
          mv .fallow/report-production.json.tmp .fallow/report-production.json

      - name: Build maintainability badge
        run: |
          node scripts/fallow-badge.mjs \
            .fallow/report.json \
            public/badges/fallow-maintainability.json \
            public/badges/fallow-metrics.json

      - name: Commit badge update
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- public/badges/fallow-maintainability.json public/badges/fallow-metrics.json; then
            echo "Badge files unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/badges/fallow-maintainability.json public/badges/fallow-metrics.json
          git commit -m "chore: update Fallow maintainability badge"
          git push

      - name: Enforce maintainability gate
        run: |
          node scripts/check-fallow-gate.mjs .fallow/report.json

      - name: Summarize production-only report
        shell: bash
        run: |
          node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync('.fallow/report-production.json','utf8')); const maintainability=Number(report.health?.summary?.average_maintainability ?? NaN); const issues=Number(report.check?.total_issues ?? report.total_issues ?? 0); console.log(JSON.stringify({ mode: 'production-informational', maintainability: Number.isFinite(maintainability) ? Number(maintainability.toFixed(1)) : null, issues }, null, 2));"
