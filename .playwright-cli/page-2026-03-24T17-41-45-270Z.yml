          - generic [ref=e91]:
            - heading [level=3] [ref=e92]: WhatsApp Cloud API
            - button [ref=e93] [cursor=pointer]:
              - img [ref=e94]
          - generic [ref=e97]: WhatsApp Cloud API enables you to programmatically message and call on WhatsApp. You can use Cloud API to send users a variety of messages, from simple text messages to rich media and interactive messages.
          - generic [ref=e98]: "WhatsApp Cloud API includes:"
          - list [ref=e99]:
            - listitem [ref=e101]:
              - strong [ref=e102]: "Messaging:"
              - text: Send text messages, rich media, and interactive messages
            - listitem [ref=e104]:
              - strong [ref=e105]: "Calling:"
              - text: Make and receive calls to customers
            - listitem [ref=e107]:
              - strong [ref=e108]: "Groups:"
              - text: Create, manage, and message WhatsApp group conversations
          - generic [ref=e109]: "WhatsApp messaging provides a powerful and private way to engage with customers. Use Cloud API to:"
          - list [ref=e110]:
            - listitem [ref=e112]: Send order confirmations and shipping updates
            - listitem [ref=e114]: Share appointment availability and other reminders
            - listitem [ref=e116]: Drive upsell and cross-sell opportunities
            - listitem [ref=e118]: Facilitate end-to-end transactions, from product discovery to payment
            - listitem [ref=e120]: Enable multi-factor authentication or one-time passwords to verify accounts and users
            - listitem [ref=e122]: Deliver custom interactive conversational experiences
          - link [ref=e124] [cursor=pointer]:
            - /url: /documentation/business-messaging/whatsapp/messages/send-messages
            - text: Learn more about message types on WhatsApp Cloud API.
          - generic [ref=e127]:
            - heading [level=3] [ref=e128]: Business Management API
            - button [ref=e129] [cursor=pointer]:
              - img [ref=e130]
          - generic [ref=e133]: The WhatsApp Business Management API enables you to programmatically manage a WhatsApp Business Account and its associated assets.
          - generic [ref=e134]: "Manage account assets with Business Management API like:"
          - list [ref=e135]:
            - listitem [ref=e137]:
              - strong [ref=e138]: "Business phone numbers:"
              - text: Add and remove phone numbers associated with your business
            - listitem [ref=e140]:
              - strong [ref=e141]: "Templates:"
              - text: Create and modify message templates for scalable messaging.
          - generic [ref=e142]: "Business Management API also gives you access to account analytics like:"
          - list [ref=e143]:
            - listitem [ref=e145]:
              - strong [ref=e146]: "Messaging analytics:"
              - text: The number and type of messages sent and delivered.
            - listitem [ref=e148]:
              - strong [ref=e149]: "Pricing analytics:"
              - text: Granular pricing breakdowns for delivered messages.
            - listitem [ref=e151]:
              - generic [ref=e152]:
                - strong [ref=e153]: "Template analytics:"
                - text: Sent/read/delivered template metrics, alongside template message button clicks.
            - listitem [ref=e155]:
              - link [ref=e156] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/templates/overview
                - text: Learn more about message templates.
            - listitem [ref=e158]:
              - link [ref=e159] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/business-phone-numbers/phone-numbers
                - text: Learn more about managing business phone numbers.
            - listitem [ref=e161]:
              - link [ref=e162] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/analytics
                - text: Learn more about account analytics.
          - generic [ref=e165]:
            - heading [level=3] [ref=e166]: Marketing Messages API for WhatsApp
            - button [ref=e167] [cursor=pointer]:
              - img [ref=e168]
          - generic [ref=e171]: MM API for WhatsApp is an API for sending optimized marketing messages on WhatsApp.
          - generic [ref=e172]: When you send marketing messages through the MM API for WhatsApp, you can access new features not available on Cloud API and get automatic optimizations, so high engagement messages can reach more customers.
          - generic [ref=e173]: "The MM API for WhatsApp includes:"
          - list [ref=e174]:
            - listitem [ref=e176]:
              - strong [ref=e177]: "Quality-based delivery:"
              - text: Up to 9% higher marketing message deliveries over Cloud API for high engagement content.
            - listitem [ref=e179]:
              - strong [ref=e180]: "Automated creative optimizations:"
              - text: Automatic enhancements to marketing creative to increase message performance.
            - listitem [ref=e182]:
              - strong [ref=e183]: "Performance benchmarks and recommendations:"
              - text: Comparison of read and click rates versus similar templates from businesses in your region.
            - listitem [ref=e185]:
              - strong [ref=e186]: "Conversion metrics:"
              - text: Measure marketing messages that lead users to perform app events such as ‘Add to Cart’, ‘Checkout Initiated’, or ‘Purchase’.
          - link [ref=e188] [cursor=pointer]:
            - /url: /documentation/business-messaging/whatsapp/marketing-messages/overview
            - text: Learn more about the Marketing Messages API for WhatsApp.
          - generic [ref=e191]:
            - heading [level=3] [ref=e192]: Webhooks
            - button [ref=e193] [cursor=pointer]:
              - img [ref=e194]
          - generic [ref=e197]: Webhooks deliver JSON payloads to your server for message status updates, incoming messages, asynchronous error handling, and many other notification utilities.
          - generic [ref=e198]: The platform relies heavily on webhooks, as the contents of any message sent from a WhatsApp user to your business phone number is communicated via webhook, and all outgoing message delivery status updates are reported via webhook.
