          - generic [ref=e309]: "Updated: Dec 5, 2025"
          - generic [ref=e310]: The WhatsApp Business Platform enables businesses to communicate with customers at scale.
          - generic [ref=e311]:
            - text: This documentation is intended for developers using our APIs. If you are looking for information on other ways to use WhatsApp for your business see the
            - link "WhatsApp Business site⁠ This link opens in a new tab or window" [ref=e312] [cursor=pointer]:
