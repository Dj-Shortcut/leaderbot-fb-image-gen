          - generic [ref=e319]:
            - heading "Core APIs and capabilities" [level=2] [ref=e320]
            - button [ref=e321] [cursor=pointer]:
              - img [ref=e322]
          - generic [ref=e327]:
            - heading "WhatsApp Cloud API" [level=3] [ref=e328]
            - button [ref=e329] [cursor=pointer]:
              - img [ref=e330]
          - generic [ref=e333]: WhatsApp Cloud API enables you to programmatically message and call on WhatsApp. You can use Cloud API to send users a variety of messages, from simple text messages to rich media and interactive messages.
          - generic [ref=e334]: "WhatsApp Cloud API includes:"
          - list [ref=e335]:
            - listitem [ref=e337]:
              - strong [ref=e338]: "Messaging:"
              - text: Send text messages, rich media, and interactive messages
            - listitem [ref=e340]:
              - strong [ref=e341]: "Calling:"
              - text: Make and receive calls to customers
            - listitem [ref=e343]:
              - strong [ref=e344]: "Groups:"
              - text: Create, manage, and message WhatsApp group conversations
          - generic [ref=e345]: "WhatsApp messaging provides a powerful and private way to engage with customers. Use Cloud API to:"
          - list [ref=e346]:
            - listitem [ref=e348]: Send order confirmations and shipping updates
            - listitem [ref=e350]: Share appointment availability and other reminders
            - listitem [ref=e352]: Drive upsell and cross-sell opportunities
            - listitem [ref=e354]: Facilitate end-to-end transactions, from product discovery to payment
            - listitem [ref=e356]: Enable multi-factor authentication or one-time passwords to verify accounts and users
            - listitem [ref=e358]: Deliver custom interactive conversational experiences
          - link "Learn more about message types on WhatsApp Cloud API." [ref=e360] [cursor=pointer]:
            - /url: /documentation/business-messaging/whatsapp/messages/send-messages
          - generic [ref=e363]:
            - heading "Business Management API" [level=3] [ref=e364]
            - button [ref=e365] [cursor=pointer]:
              - img [ref=e366]
          - generic [ref=e369]: The WhatsApp Business Management API enables you to programmatically manage a WhatsApp Business Account and its associated assets.
          - generic [ref=e370]: "Manage account assets with Business Management API like:"
          - list [ref=e371]:
            - listitem [ref=e373]:
              - strong [ref=e374]: "Business phone numbers:"
              - text: Add and remove phone numbers associated with your business
            - listitem [ref=e376]:
              - strong [ref=e377]: "Templates:"
              - text: Create and modify message templates for scalable messaging.
          - generic [ref=e378]: "Business Management API also gives you access to account analytics like:"
          - list [ref=e379]:
            - listitem [ref=e381]:
              - strong [ref=e382]: "Messaging analytics:"
              - text: The number and type of messages sent and delivered.
            - listitem [ref=e384]:
              - strong [ref=e385]: "Pricing analytics:"
              - text: Granular pricing breakdowns for delivered messages.
            - listitem [ref=e387]:
              - generic [ref=e388]:
                - strong [ref=e389]: "Template analytics:"
                - text: Sent/read/delivered template metrics, alongside template message button clicks.
            - listitem [ref=e391]:
              - link "Learn more about message templates." [ref=e392] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/templates/overview
            - listitem [ref=e394]:
              - link "Learn more about managing business phone numbers." [ref=e395] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/business-phone-numbers/phone-numbers
            - listitem [ref=e397]:
              - link "Learn more about account analytics." [ref=e398] [cursor=pointer]:
                - /url: /documentation/business-messaging/whatsapp/analytics
          - generic [ref=e401]:
            - heading "Marketing Messages API for WhatsApp" [level=3] [ref=e402]
            - button [ref=e403] [cursor=pointer]:
              - img [ref=e404]
          - generic [ref=e407]: MM API for WhatsApp is an API for sending optimized marketing messages on WhatsApp.
          - generic [ref=e408]: When you send marketing messages through the MM API for WhatsApp, you can access new features not available on Cloud API and get automatic optimizations, so high engagement messages can reach more customers.
          - generic [ref=e409]: "The MM API for WhatsApp includes:"
          - list [ref=e410]:
            - listitem [ref=e412]:
              - strong [ref=e413]: "Quality-based delivery:"
              - text: Up to 9% higher marketing message deliveries over Cloud API for high engagement content.
            - listitem [ref=e415]:
              - strong [ref=e416]: "Automated creative optimizations:"
              - text: Automatic enhancements to marketing creative to increase message performance.
            - listitem [ref=e418]:
              - strong [ref=e419]: "Performance benchmarks and recommendations:"
              - text: Comparison of read and click rates versus similar templates from businesses in your region.
            - listitem [ref=e421]:
              - strong [ref=e422]: "Conversion metrics:"
              - text: Measure marketing messages that lead users to perform app events such as ‘Add to Cart’, ‘Checkout Initiated’, or ‘Purchase’.
          - link "Learn more about the Marketing Messages API for WhatsApp." [ref=e424] [cursor=pointer]:
            - /url: /documentation/business-messaging/whatsapp/marketing-messages/overview
          - generic [ref=e427]:
            - heading "Webhooks" [level=3] [ref=e428]
            - button [ref=e429] [cursor=pointer]:
              - img [ref=e430]
          - generic [ref=e433]: Webhooks deliver JSON payloads to your server for message status updates, incoming messages, asynchronous error handling, and many other notification utilities.
          - generic [ref=e434]: The platform relies heavily on webhooks, as the contents of any message sent from a WhatsApp user to your business phone number is communicated via webhook, and all outgoing message delivery status updates are reported via webhook.
